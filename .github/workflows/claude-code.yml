name: Claude Code Auto Development

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    if: github.actor != 'claude[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "claude API"
          branch_name_template: "Claude-Code-API"
      - name: Create PR
        run: |
          if gh pr list --repo "${{ github.repository }}" --head "Claude-Code-API" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "PR already exists"
          else
            gh pr create --repo "${{ github.repository }}" --base main --head Claude-Code-API --fill || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
